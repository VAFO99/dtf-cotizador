<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- Primary meta -->
    <title>Artampa — Cotización DTF personalizada</title>
    <meta name="description" content="Solicitá tu cotización de estampado DTF en minutos. Camisas, hoodies y más con diseños de alta calidad en Honduras." />
    <meta name="theme-color" content="#22D3EE" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Artampa DTF" />

    <!-- Open Graph (for WhatsApp/social sharing) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Artampa — Cotización DTF personalizada" />
    <meta property="og:description" content="Personalizá tus prendas con estampado DTF. Cotizá en minutos, entrega en 24-48h en Honduras." />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:locale" content="es_HN" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Artampa — Cotización DTF" />
    <meta name="twitter:description" content="Personalizá tus prendas con estampado DTF en Honduras." />

    <!-- Fonts preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-size: 16px; -webkit-text-size-adjust: 100%; }
      body { background: #080A10; overscroll-behavior: none; }
      /* Skip link for accessibility */
      .skip-link {
        position: absolute; top: -100px; left: 8px; z-index: 9999;
        background: #22D3EE; color: #080A10; padding: 8px 16px;
        border-radius: 0 0 8px 8px; font-weight: 700; text-decoration: none;
        font-family: sans-serif; font-size: 14px;
        transition: top .2s;
      }
      .skip-link:focus { top: 0; }
    </style>
  </head>
  <body>
    <!-- Skip link for keyboard users -->
    <a href="#main-content" class="skip-link">Saltar al contenido</a>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
